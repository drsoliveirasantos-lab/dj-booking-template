<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">Jheff Brasil logo</title>
  <desc id="desc">Stylized Jheff Brasil wordmark inspired by the official logo.</desc>
  <defs>
